<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }

    h1 { font-size: 2rem; letter-spacing: 2px; color: #e94560; }

    #status {
      font-size: 1.2rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.05); }
    .cell.taken { cursor: default; }
    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }
    .cell.win { background: #0f3460; animation: pulse 0.5s ease; }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #reset {
      padding: 10px 32px;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reset:hover { background: #c73652; }

    #scores {
      display: flex;
      gap: 32px;
      font-size: 1rem;
      color: #888;
    }

    #scores span { text-align: center; }
    #scores b { display: block; font-size: 1.4rem; color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <span>X Wins<b id="xScore">0</b></span>
    <span>Draws<b id="draws">0</b></span>
    <span>O Wins<b id="oScore">0</b></span>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over;
    const scores = { X: 0, O: 0, D: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      status.textContent = "X's turn";
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    function handleClick(e) {
      const cell = e.currentTarget;
      const i = +cell.dataset.i;
      if (over || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const result = checkWinner();
      if (result) {
        over = true;
        if (result.winner) {
          result.line.forEach(idx => cells[idx].classList.add('win'));
          scores[result.winner]++;
          status.textContent = `${result.winner} wins!`;
        } else {
          scores.D++;
          status.textContent = "It's a draw!";
        }
        document.getElementById('xScore').textContent = scores.X;
        document.getElementById('oScore').textContent = scores.O;
        document.getElementById('draws').textContent = scores.D;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    }

    cells.forEach(c => c.addEventListener('click', handleClick));
    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
